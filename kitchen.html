<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kitchen Screen</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

.order{
  background:#222;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  transition:0.3s;
}

.pending{border-left:8px solid yellow;}
.preparing{border-left:8px solid blue;}
.done{border-left:8px solid green;}

select{
  font-size:16px;
  padding:5px;
}
</style>
</head>

<body>

<h1>🍜 Kitchen Orders</h1>

<div id="orders"></div>

<script>

const SHEET_API =
"https://script.google.com/macros/s/AKfycbxiS-WwDdEI711nSCb6YYYtvYXWsjnh8W1lZ7IkuLWYdrZfSXDRpoatikcT_SUVlcrR/exec";

function loadOrders(){

fetch(SHEET_API + "?t=" + Date.now())
.then(res => res.text())
.then(text => {

let data = JSON.parse(text);

let container = document.getElementById("orders");
container.innerHTML = "";

if(!data || data.length === 0){
  container.innerHTML="<h3>No Orders Yet</h3>";
  return;
}

/* =========================
   GROUP ORDERS
========================= */

let activeTables = {};
let completedOrders = [];

data.forEach(order => {

let status = order.status || "Pending";

// ACTIVE (Pending + Preparing)
if(status === "Pending" || status === "Preparing"){

  if(!activeTables[order.table]){
    activeTables[order.table] = [];
  }

  activeTables[order.table].push(order);
}
else{
  completedOrders.push(order);
}

});


/* =========================
   SHOW ACTIVE ORDERS
========================= */

container.innerHTML += "<h2>🔥 Active Orders</h2>";

Object.keys(activeTables).forEach(table => {

let card = document.createElement("div");
card.className = "order pending";

let itemsHTML = "";
let total = 0;

activeTables[table].forEach(order=>{

itemsHTML += `
<p>${order.items}</p>

<select onchange="updateStatus('${order.id}',this.value)">
<option ${order.status=="Pending"?"selected":""}>Pending</option>
<option ${order.status=="Preparing"?"selected":""}>Preparing</option>
<option ${order.status=="Done"?"selected":""}>Done</option>
<option ${order.status=="Cancel"?"selected":""}>Cancel</option>
</select>
<hr>
`;

total += Number(order.total);
});

card.innerHTML = `
<h2>Table ${table}</h2>
${itemsHTML}
<h3>Total RM ${total}</h3>

<button onclick="printOrder(this)">🖨️ Print Table</button>
`;

container.appendChild(card);

});


/* =========================
   SHOW COMPLETED
========================= */

container.innerHTML += "<h2>✅ Completed Orders</h2>";

completedOrders.forEach(order=>{

let card=document.createElement("div");
card.className="order done";

card.innerHTML=`
<h3>Table ${order.table}</h3>
<p>${order.items}</p>
<p>Status: ${order.status}</p>
`;

container.appendChild(card);

});

})
.catch(err=>console.error("LOAD ERROR:",err));
}
 function updateStatus(id, status){

  fetch(SHEET_API, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify({
      action: "updateStatus",
      id: id,
      status: status
    })
  })
  .then(()=>console.log("Status sent"))
  .catch(err=>console.error(err));
}

// auto refresh every 5 seconds
setInterval(loadOrders, 5000);

// first load
loadOrders();
function printOrder(btn){

  let orderCard = btn.parentElement;

  let printWindow = window.open("", "", "width=300,height=600");

  printWindow.document.write(`
    <html>
    <head>
      <title>Kitchen Ticket</title>

      <style>
        @page {
          size: 80mm auto;
          margin: 0;
        }

        body{
          font-family: monospace;
          width:72mm;
          margin:0;
          padding:5mm;
          font-size:16px;
        }

        button, select{
          display:none;
        }

        hr{
          border-top:1px dashed black;
        }
      </style>
    </head>

    <body>
      ${orderCard.innerHTML}
    </body>
    </html>
  `);
  /* ✅ PRINT ONLY AFTER LOAD */
  printWindow.onload = function(){
      printWindow.focus();
      printWindow.print();

      printWindow.onafterprint = function(){
        printWindow.close();
      };
  };
}
</script>
