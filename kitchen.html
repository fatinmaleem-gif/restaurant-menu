<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kitchen Screen</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  padding:20px;
}

.order{
  background:#222;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.pending{border-left:8px solid yellow;}
.preparing{border-left:8px solid blue;}
.done{border-left:8px solid green;}
.cancel{border-left:8px solid red;}

button{
  padding:6px 10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🍜 Kitchen Orders</h1>

<div id="orders"></div>

<script>

const SHEET_API =
"https://script.google.com/macros/s/AKfycbxiS-WwDdEI711nSCb6YYYtvYXWsjnh8W1lZ7IkuLWYdrZfSXDRpoatikcT_SUVlcrR/exec";


// ================= LOAD ORDERS =================
function loadOrders(){

fetch(SHEET_API + "?t=" + Date.now())
.then(res => res.json())
.then(data => {

const container = document.getElementById("orders");
container.innerHTML = "";

if(!data || data.length === 0){
  container.innerHTML="<h3>No Orders Yet</h3>";
  return;
}

data.reverse().forEach(order => {

const statusClass = (order.status || "Pending").toLowerCase();

const card=document.createElement("div");
card.className="order "+statusClass;

card.innerHTML=`
<h2>Table ${order.table}</h2>
<p>${order.items}</p>
<h3>RM ${order.total}</h3>

<p>Status: ${order.status}</p>

<select onchange="updateStatus('${order.id}',this.value)">
<option ${order.status=="Pending"?"selected":""}>Pending</option>
<option ${order.status=="Preparing"?"selected":""}>Preparing</option>
<option ${order.status=="Done"?"selected":""}>Done</option>
<option ${order.status=="Cancel"?"selected":""}>Cancel</option>
</select>

<br>
<button onclick="printOrder(this)">🖨️ Print</button>
`;

container.appendChild(card);

});

})
.catch(err=>console.error("LOAD ERROR:",err));
}


// ================= UPDATE STATUS =================
function updateStatus(id,status){

fetch(SHEET_API,{
method:"POST",
headers:{
"Content-Type":"text/plain;charset=utf-8"
},
body:JSON.stringify({
action:"updateStatus",
id:id,
status:status
})
});

}


// ================= PRINT =================
window.printOrder = function(btn){

  let card = btn.closest(".order");

  let table = card.querySelector("h2").innerText;
  let items = card.querySelector("p").innerText;
  let total = card.querySelector("h3").innerText;

  let printWindow = window.open("", "", "width=300,height=600");

  printWindow.document.write(`
    <body onload="window.print();setTimeout(()=>window.close(),500);">
      <h2>${table}</h2>
      <p>${items}</p>
      <h3>${total}</h3>
    </body>
  `);

  printWindow.document.close();
}

loadOrders();
setInterval(loadOrders, 5000);

</script>

</body>
</html>
